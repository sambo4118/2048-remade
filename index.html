<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>2048 Remade</title>
    <style>
      :root {
        color-scheme: dark;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: radial-gradient(circle at 20% 20%, #2a2f3a 0%, #171a21 45%, #0e1015 100%);
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      }

      .board {
        position: relative;
        width: 520px;
        height: 520px;
      }
      .board canvas {
        position: absolute;
        inset: 0;
      }
      #gameCanvas {
        z-index: 2;
        background: transparent;
        pointer-events: none;
      }
      #gridCanvas {
        z-index: 1;
        background: #1f2530;
      }

      canvas {
        width: min(92vw, 520px);
        height: min(92vw, 520px);
        border-radius: 14px;
        box-shadow: 0 18px 40px rgba(0, 0, 0, 0.45);
        border: 1px solid rgba(255, 255, 255, 0.08);
      }
    </style>
  </head>
  <body>
    <div class="board">
      <canvas id="gridCanvas" width="520" height="520"></canvas>
      <canvas id="gameCanvas" width="520" height="520"></canvas>

    </div>
    <script src="./index.js"></script>
  </body>
</html>
